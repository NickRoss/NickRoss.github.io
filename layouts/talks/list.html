{{ define "main" }}
<article class="page">
  <h1>{{ .Title }}</h1>

  <div class="entry">
    {{ .Content }}

    {{ range .Pages.ByDate.Reverse }}
    <p><a href="{{ .RelPermalink }}">{{ .Params.event }}: {{ .Title }} ({{ .Date.Format "01/2006" }})</a></p>
    {{ end }}
  </div>
</article>
{{ end }}
